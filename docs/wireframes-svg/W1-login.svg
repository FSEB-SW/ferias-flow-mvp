<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" font-family="Arial, Helvetica, sans-serif">
  <rect width="1440" height="1000" fill="#ffffff"/>

  <!-- Titulo do wireframe -->
  <text x="80" y="46" font-size="22" font-weight="bold" fill="#333333">W1 — Login</text>
  <text x="80" y="70" font-size="14" fill="#777777">Historia atendida: US01 · Baixa fidelidade (esqueleto, sem cor/imagem)</text>

  <!-- Frame -->
  <rect x="80" y="90" width="1280" height="860" fill="#ffffff" stroke="#333333" stroke-width="2"/>

  <!-- Barra superior minima (nao logado) -->
  <rect x="80" y="90" width="1280" height="64" fill="#f2f2f2" stroke="#999999"/>
  <rect x="112" y="106" width="150" height="32" fill="#ffffff" stroke="#999999"/>
  <text x="187" y="127" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">FeriasFlow</text>
  <text x="1330" y="127" font-size="13" fill="#777777" text-anchor="end">app web de gestao de ferias</text>

  <!-- Card central de login -->
  <rect x="510" y="270" width="420" height="470" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>

  <!-- Logo placeholder (caixa com X) -->
  <rect x="670" y="300" width="100" height="60" fill="#ffffff" stroke="#999999"/>
  <line x1="670" y1="300" x2="770" y2="360" stroke="#999999"/>
  <line x1="770" y1="300" x2="670" y2="360" stroke="#999999"/>
  <text x="720" y="392" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Entrar no FeriasFlow</text>

  <!-- Campo e-mail -->
  <text x="560" y="440" font-size="14" fill="#333333">E-mail</text>
  <rect x="560" y="450" width="320" height="44" fill="#ffffff" stroke="#999999"/>
  <text x="572" y="477" font-size="14" fill="#aaaaaa">nome@empresa.com</text>

  <!-- Campo senha -->
  <text x="560" y="530" font-size="14" fill="#333333">Senha</text>
  <rect x="560" y="540" width="320" height="44" fill="#ffffff" stroke="#999999"/>
  <text x="572" y="567" font-size="14" fill="#aaaaaa">********</text>

  <!-- Mensagem de erro (estado de validacao) -->
  <rect x="560" y="596" width="320" height="34" fill="#f2f2f2" stroke="#999999" stroke-dasharray="4 3"/>
  <text x="572" y="618" font-size="12" fill="#777777">! Credenciais invalidas. Verifique e tente novamente.</text>

  <!-- Botao entrar -->
  <rect x="560" y="648" width="320" height="48" fill="#333333"/>
  <text x="720" y="678" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Entrar</text>

  <!-- Link -->
  <text x="720" y="722" font-size="13" fill="#777777" text-anchor="middle" text-decoration="underline">Esqueci minha senha</text>

  <!-- Notas de anotacao -->
  <text x="80" y="980" font-size="12" fill="#999999">Criterios (US01): sucesso -> area do usuario com nome e papel; erro -> mensagem clara sem indicar qual campo errou, permanece na tela.</text>
</svg>
