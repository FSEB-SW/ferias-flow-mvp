<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" font-family="Arial, Helvetica, sans-serif">
  <rect width="1440" height="1000" fill="#ffffff"/>

  <!-- Titulo do wireframe -->
  <text x="80" y="46" font-size="22" font-weight="bold" fill="#333333">W4 — Equipe do gestor (lista + cadastro de colaborador)</text>
  <text x="80" y="70" font-size="14" fill="#777777">Historias atendidas: US03, US02 (visao restrita ao papel gestor) · Baixa fidelidade</text>

  <!-- Frame -->
  <rect x="80" y="90" width="1280" height="860" fill="#ffffff" stroke="#333333" stroke-width="2"/>

  <!-- Barra superior (nav do gestor) -->
  <rect x="80" y="90" width="1280" height="64" fill="#f2f2f2" stroke="#999999"/>
  <rect x="112" y="106" width="150" height="32" fill="#ffffff" stroke="#999999"/>
  <text x="187" y="127" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">FeriasFlow</text>
  <text x="330" y="127" font-size="14" font-weight="bold" fill="#333333">Equipe</text>
  <rect x="326" y="136" width="52" height="3" fill="#333333"/>
  <text x="420" y="127" font-size="14" fill="#777777">Calendario</text>
  <text x="540" y="127" font-size="14" fill="#777777">Pedidos</text>
  <circle cx="1150" cy="122" r="14" fill="#ffffff" stroke="#999999"/>
  <line x1="1140" y1="112" x2="1160" y2="132" stroke="#999999"/>
  <line x1="1160" y1="112" x2="1140" y2="132" stroke="#999999"/>
  <text x="1330" y="127" font-size="13" fill="#333333" text-anchor="end">Gustavo · Gestor</text>

  <!-- Breadcrumb -->
  <text x="112" y="190" font-size="13" fill="#777777">Equipe</text>
  <text x="112" y="226" font-size="24" font-weight="bold" fill="#333333">Minha equipe</text>

  <!-- Botao adicionar -->
  <rect x="1108" y="200" width="220" height="40" fill="#333333"/>
  <text x="1218" y="226" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">+ Adicionar colaborador</text>

  <!-- Tabela de colaboradores (US03) -->
  <rect x="112" y="260" width="760" height="40" fill="#f2f2f2" stroke="#999999"/>
  <text x="132" y="286" font-size="13" font-weight="bold" fill="#333333">Nome</text>
  <text x="392" y="286" font-size="13" font-weight="bold" fill="#333333">E-mail</text>
  <text x="672" y="286" font-size="13" font-weight="bold" fill="#333333">Saldo</text>
  <text x="752" y="286" font-size="13" font-weight="bold" fill="#333333">Acoes</text>

  <g stroke="#cccccc" fill="#ffffff">
    <rect x="112" y="300" width="760" height="48"/>
    <rect x="112" y="348" width="760" height="48"/>
    <rect x="112" y="396" width="760" height="48"/>
    <rect x="112" y="444" width="760" height="48"/>
    <rect x="112" y="492" width="760" height="48"/>
  </g>
  <text x="132" y="330" font-size="13" fill="#333333">Carla Mendes</text>
  <text x="392" y="330" font-size="13" fill="#777777">carla@empresa.com</text>
  <text x="672" y="330" font-size="13" fill="#333333">18</text>
  <text x="752" y="330" font-size="12" fill="#333333" text-decoration="underline">Editar · Inativar</text>

  <text x="132" y="378" font-size="13" fill="#333333">Diego Rocha</text>
  <text x="392" y="378" font-size="13" fill="#777777">diego@empresa.com</text>
  <text x="672" y="378" font-size="13" fill="#333333">30</text>
  <text x="752" y="378" font-size="12" fill="#333333" text-decoration="underline">Editar · Inativar</text>

  <text x="132" y="426" font-size="13" fill="#333333">Fernanda Lima</text>
  <text x="392" y="426" font-size="13" fill="#777777">fernanda@empresa.com</text>
  <text x="672" y="426" font-size="13" fill="#333333">12</text>
  <text x="752" y="426" font-size="12" fill="#333333" text-decoration="underline">Editar · Inativar</text>

  <text x="132" y="474" font-size="13" fill="#333333">Rafael Souza</text>
  <text x="392" y="474" font-size="13" fill="#777777">rafael@empresa.com</text>
  <text x="672" y="474" font-size="13" fill="#333333">25</text>
  <text x="752" y="474" font-size="12" fill="#333333" text-decoration="underline">Editar · Inativar</text>

  <text x="132" y="522" font-size="13" fill="#999999">Bruna Alves (inativa)</text>
  <text x="392" y="522" font-size="13" fill="#cccccc">bruna@empresa.com</text>
  <text x="672" y="522" font-size="13" fill="#999999">0</text>
  <text x="752" y="522" font-size="12" fill="#999999" text-decoration="underline">Reativar</text>

  <!-- Nota inativacao -->
  <rect x="112" y="568" width="760" height="56" fill="#ffffff" stroke="#999999" stroke-dasharray="5 4"/>
  <text x="132" y="592" font-size="12" fill="#777777">Remover colaborador COM pedidos vinculados -> confirmacao + inativacao (nao exclui).</text>
  <text x="132" y="612" font-size="12" fill="#777777">Sem pedidos vinculados -> sai da lista (criterios da US03).</text>

  <!-- Painel de cadastro (formulario) -->
  <rect x="900" y="260" width="428" height="470" fill="#f2f2f2" stroke="#333333" stroke-width="1.5"/>
  <text x="928" y="298" font-size="16" font-weight="bold" fill="#333333">Cadastrar colaborador</text>
  <line x1="928" y1="312" x2="1300" y2="312" stroke="#999999"/>

  <text x="928" y="348" font-size="13" fill="#333333">Nome *</text>
  <rect x="928" y="358" width="372" height="40" fill="#ffffff" stroke="#999999"/>

  <text x="928" y="432" font-size="13" fill="#333333">E-mail *</text>
  <rect x="928" y="442" width="372" height="40" fill="#ffffff" stroke="#999999"/>

  <text x="928" y="516" font-size="13" fill="#333333">Saldo inicial de dias *</text>
  <rect x="928" y="526" width="160" height="40" fill="#ffffff" stroke="#999999"/>

  <!-- Validacao -->
  <rect x="928" y="584" width="372" height="40" fill="#ffffff" stroke="#999999" stroke-dasharray="4 3"/>
  <text x="940" y="609" font-size="11.5" fill="#777777">! Campo obrigatorio vazio ou saldo negativo -> bloqueia</text>

  <!-- Botoes -->
  <rect x="928" y="644" width="180" height="44" fill="#333333"/>
  <text x="1018" y="672" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Salvar</text>
  <rect x="1120" y="644" width="180" height="44" fill="#ffffff" stroke="#999999"/>
  <text x="1210" y="672" font-size="14" fill="#333333" text-anchor="middle">Cancelar</text>

  <!-- Nota papel -->
  <rect x="112" y="700" width="760" height="120" fill="#ffffff" stroke="#999999" stroke-dasharray="5 4"/>
  <text x="132" y="728" font-size="12" fill="#777777">US02 (acesso por papel): esta tela existe apenas para o papel GESTOR.</text>
  <text x="132" y="748" font-size="12" fill="#777777">Colaborador que tentar acessar a rota /equipe recebe "Acesso negado".</text>
  <text x="132" y="768" font-size="12" fill="#777777">Menu do colaborador (W2) nao exibe os itens Equipe/Calendario/Pedidos do gestor.</text>
  <text x="132" y="796" font-size="12" fill="#777777">US03 e a HISTORIA DE REFERENCIA da estimativa: CRUD basico = 3 story points.</text>

  <!-- Notas -->
  <text x="80" y="980" font-size="12" fill="#999999">Krug: nav do gestor com "Equipe" ativo (onde estou); acoes Editar/Inativar e botao Adicionar (para onde posso ir).</text>
</svg>
