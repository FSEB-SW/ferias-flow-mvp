<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" font-family="Arial, Helvetica, sans-serif">
  <rect width="1440" height="1000" fill="#ffffff"/>

  <!-- Titulo do wireframe -->
  <text x="80" y="46" font-size="22" font-weight="bold" fill="#333333">W5 — Detalhe do pedido (status + justificativa)</text>
  <text x="80" y="70" font-size="14" fill="#777777">Historia atendida: US06 (detalhe) · Baixa fidelidade (esqueleto, sem cor/imagem)</text>

  <!-- Frame -->
  <rect x="80" y="90" width="1280" height="860" fill="#ffffff" stroke="#333333" stroke-width="2"/>

  <!-- Barra superior -->
  <rect x="80" y="90" width="1280" height="64" fill="#f2f2f2" stroke="#999999"/>
  <rect x="112" y="106" width="150" height="32" fill="#ffffff" stroke="#999999"/>
  <text x="187" y="127" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">FeriasFlow</text>
  <text x="330" y="127" font-size="14" fill="#777777">Inicio</text>
  <text x="410" y="127" font-size="14" fill="#777777">Solicitar ferias</text>
  <text x="540" y="127" font-size="14" font-weight="bold" fill="#333333">Meus pedidos</text>
  <rect x="536" y="136" width="98" height="3" fill="#333333"/>
  <circle cx="1150" cy="122" r="14" fill="#ffffff" stroke="#999999"/>
  <line x1="1140" y1="112" x2="1160" y2="132" stroke="#999999"/>
  <line x1="1160" y1="112" x2="1140" y2="132" stroke="#999999"/>
  <text x="1330" y="127" font-size="13" fill="#333333" text-anchor="end">Carla · Colaboradora</text>

  <!-- Breadcrumb -->
  <text x="112" y="190" font-size="13" fill="#777777">Inicio &gt; Meus pedidos &gt; Pedido #2026-003</text>
  <text x="112" y="226" font-size="24" font-weight="bold" fill="#333333">Pedido #2026-003</text>

  <!-- Status chip -->
  <rect x="112" y="244" width="130" height="30" rx="15" fill="#ffffff" stroke="#333333" stroke-dasharray="4 3"/>
  <text x="177" y="264" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">REPROVADO</text>
  <text x="260" y="264" font-size="12" fill="#777777">decidido em 28/06/2026 por Gustavo (gestor)</text>

  <!-- Bloco dados do pedido -->
  <rect x="112" y="300" width="700" height="220" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text x="140" y="336" font-size="16" font-weight="bold" fill="#333333">Dados do pedido</text>
  <line x1="140" y1="350" x2="784" y2="350" stroke="#999999"/>
  <text x="140" y="382" font-size="13" fill="#777777">Periodo</text>
  <text x="784" y="382" font-size="13" fill="#333333" text-anchor="end">20/12/2026 a 30/12/2026</text>
  <text x="140" y="414" font-size="13" fill="#777777">Dias solicitados</text>
  <text x="784" y="414" font-size="13" fill="#333333" text-anchor="end">10</text>
  <text x="140" y="446" font-size="13" fill="#777777">Saldo na data do pedido</text>
  <text x="784" y="446" font-size="13" fill="#333333" text-anchor="end">18 dias</text>
  <text x="140" y="478" font-size="13" fill="#777777">Solicitado em</text>
  <text x="784" y="478" font-size="13" fill="#333333" text-anchor="end">25/06/2026</text>

  <!-- Bloco justificativa (criterio da US06) -->
  <rect x="112" y="548" width="700" height="140" fill="#f2f2f2" stroke="#333333" stroke-width="1.5"/>
  <text x="140" y="584" font-size="16" font-weight="bold" fill="#333333">Justificativa do gestor</text>
  <line x1="140" y1="598" x2="784" y2="598" stroke="#999999"/>
  <text x="140" y="628" font-size="13" fill="#333333">"Periodo coincide com o fechamento do ano e com as ferias ja aprovadas do</text>
  <text x="140" y="650" font-size="13" fill="#333333">Diego (cobertura minima da equipe). Proponha janeiro."</text>

  <!-- Acoes -->
  <rect x="112" y="716" width="240" height="44" fill="#333333"/>
  <text x="232" y="744" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Refazer pedido (novo periodo)</text>
  <rect x="368" y="716" width="160" height="44" fill="#ffffff" stroke="#999999"/>
  <text x="448" y="744" font-size="14" fill="#333333" text-anchor="middle">Voltar</text>

  <!-- Linha do tempo -->
  <rect x="852" y="300" width="476" height="460" fill="#ffffff" stroke="#999999" stroke-dasharray="5 4"/>
  <text x="880" y="336" font-size="16" font-weight="bold" fill="#333333">Historico</text>
  <line x1="896" y1="360" x2="896" y2="700" stroke="#999999"/>

  <circle cx="896" cy="384" r="8" fill="#333333"/>
  <text x="920" y="380" font-size="13" font-weight="bold" fill="#333333">Pedido criado</text>
  <text x="920" y="398" font-size="12" fill="#777777">25/06/2026 · Carla · status PENDENTE</text>

  <circle cx="896" cy="452" r="8" fill="#ffffff" stroke="#333333"/>
  <text x="920" y="448" font-size="13" font-weight="bold" fill="#333333">Notificacao enviada ao gestor</text>
  <text x="920" y="466" font-size="12" fill="#777777">25/06/2026 · sistema (F6 — Sprint 2)</text>

  <circle cx="896" cy="520" r="8" fill="#ffffff" stroke="#333333"/>
  <text x="920" y="516" font-size="13" font-weight="bold" fill="#333333">Analise do gestor</text>
  <text x="920" y="534" font-size="12" fill="#777777">28/06/2026 · Gustavo viu saldo + sobreposicao (W-calendario)</text>

  <circle cx="896" cy="588" r="8" fill="#333333"/>
  <text x="920" y="584" font-size="13" font-weight="bold" fill="#333333">Decisao: REPROVADO com justificativa</text>
  <text x="920" y="602" font-size="12" fill="#777777">28/06/2026 · Gustavo (gestor)</text>

  <circle cx="896" cy="656" r="8" fill="#ffffff" stroke="#333333"/>
  <text x="920" y="652" font-size="13" font-weight="bold" fill="#333333">Colaboradora notificada</text>
  <text x="920" y="670" font-size="12" fill="#777777">28/06/2026 · sistema (F6 — Sprint 2)</text>

  <!-- Notas -->
  <text x="80" y="980" font-size="12" fill="#999999">Criterio (US06): pedido reprovado -> detalhe exibe a justificativa do gestor. Krug: breadcrumb de 3 niveis (de onde vim), titulo com id do pedido (onde estou).</text>
</svg>
